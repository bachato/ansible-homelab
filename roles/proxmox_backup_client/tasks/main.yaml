- name: Gather the package facts
  ansible.builtin.package_facts:
    manager: auto

- name: "Install the package"
  ansible.builtin.include_tasks: "install-{{ ansible_architecture }}.yaml"
  when: "'proxmox-backup-client' not in ansible_facts.packages"

- name: "Create groups"
  ansible.builtin.group:
    name: backup
    state: present

- name: "Create users"
  ansible.builtin.user:
    user: backup
    append: true
    groups: backup
    comment: "I run backups"

- name: Copy service
  ansible.builtin.template:
    src: pbs-client@.service.j2
    dest: /etc/systemd/system/pbs-client@.service
    owner: root
    group: root
    mode: "644"
  vars:
    pbs_host: "{{ lookup('ini', 'host section=pbs file=proxmox.cfg') }}"
    pbs_user: "{{ lookup('ini', 'user section=pbs file=proxmox.cfg') }}"
    pbs_token: "{{ lookup('ini', 'token section=pbs file=proxmox.cfg') }}"
    pbs_datastore: "{{ lookup('ini', 'datastore section=pbs file=proxmox.cfg') }}"
    pbs_password: "{{ lookup('ini', 'password section=pbs file=proxmox.cfg') }}"
    pbs_fingerprint: "{{ lookup('ini', 'fingerprint section=pbs file=proxmox.cfg') }}"

- name: Reload systemd daemon
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Copy backup timer
  ansible.builtin.copy:
    src: pbs-client.timer
    dest: /etc/systemd/system/pbs-client.timer
    owner: root
    group: root
    mode: "644"

- name: Enable backup timer
  ansible.builtin.systemd_service:
    name: pbs-client.timer
    state: started
    enabled: true

