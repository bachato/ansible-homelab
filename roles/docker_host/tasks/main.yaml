- name: Include distribution-specific variables
  ansible.builtin.include_vars: "{{ ansible_distribution }}.yaml"

- name: "Install packages"
  ansible.builtin.package:
    update_cache: false
    name: "{{ docker_packages }}"
    state: present

- name: (Alpine) Enable and start docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: ansible_distribution == "Alpine"

- name: "Create groups"
  ansible.builtin.group:
    name: docker
    state: present

- name: "Add willem to docker group"
  ansible.builtin.user:
    name: willem
    append: true
    groups: docker

- name: "Add ansible to docker group"
  ansible.builtin.user:
    name: ansible
    append: true
    groups: docker

- name: "Create docker directory"
  ansible.builtin.file:
    path: /home/willem/docker
    state: directory
    mode: '0750'
    owner: willem
    group: docker

