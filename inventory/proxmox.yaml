plugin: community.proxmox.proxmox
url: "https://{{ lookup('ini', 'host section=pve file=proxmox.cfg') }}:8006"
validate_certs: false
user: "{{ lookup('ini', 'user section=pve file=proxmox.cfg') }}"
token_id: "{{ lookup('ini', 'token_id section=pve file=proxmox.cfg') }}"
# Token secret: read from proxmox.cfg (local) or PVE_TOKEN_SECRET env var (Semaphore/CI)
token_secret: "{{ lookup('ini', 'token_secret section=pve file=proxmox.cfg') or lookup('env', 'PVE_TOKEN_SECRET') }}"

# Enable to gather VM/LXC configuration facts
want_facts: true

# Compose dynamic host variables
compose:
  # Use the first IP address found in network configuration
  # Extract address from ipconfig0 or fall back to net0, then parse with ipaddr
  ansible_host: |
    {%- set ip = proxmox_ipconfig0.ip | default(proxmox_net0.ip) -%}
    {%- if ip -%}
      {%- set parsed = ip | ansible.utils.ipaddr('address') -%}
      {%- if parsed -%}{{ parsed }}{%- else -%}{{ ip.split('/')[0] }}{%- endif -%}
    {%- endif -%}

# Group VMs by their status and roles
keyed_groups:
  - key: proxmox_status
    prefix: status
  - key: proxmox_type
    prefix: type
  - key: proxmox_node
    prefix: node
  # Group by individual tags (roles)
  - key: proxmox_tags_parsed | default([])
    prefix: role
    separator: "_"

# Show all VMs/containers (remove status filter)
# filters:
#   - proxmox_status == "running"
