- name: Prepare SSH connection
  hosts: all
  gather_facts: false
  tasks:
    - name: Clean old SSH host keys
      delegate_to: localhost
      ansible.builtin.shell: |
        ssh-keygen -R {{ inventory_hostname }} 2>/dev/null || true
      run_once: true

    - name: Add fresh SSH host keys
      delegate_to: localhost
      ansible.builtin.shell: |
        ssh-keyscan -H {{ inventory_hostname }} >> ~/.ssh/known_hosts
      run_once: true

- name: Cloud Provision
  hosts: all
  gather_facts: false
  become: true
  pre_tasks:
    - name: Gather facts without become to detect OS
      ansible.builtin.setup:
      become: false

    - name: Set become method based on OS
      ansible.builtin.set_fact:
        ansible_become_method: "{{ 'doas' if ansible_facts['os_family'] == 'Alpine' else 'sudo' }}"
      become: false
  tasks:
    - name: "Create groups"
      ansible.builtin.group:
        name: sudo
        state: present

    - name: "Create willem user"
      ansible.builtin.user:
        name: willem
        append: true
        groups: sudo
        comment: "Willem Vooijs"

    - name: "Add willem public key"
      ansible.posix.authorized_key:
        user: willem
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOg/Z5cn1yTCykFLYmCnEYQ/NQPPeelwqZJ2kNbvWTEb"

    - name: "Create ansible user"
      ansible.builtin.user:
        name: ansible
        append: true
        groups: sudo
        comment: "Ansible automation user"
        password: "*"  # Disabled password (not a real password) - required on Alpine to allow pubkey auth

    - name: "Add ansible public key"
      ansible.posix.authorized_key:
        user: ansible
        key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGjx5Lj0zQ8m9sNA/POSVJ/Ys9oYyHmOHRThaq8PhMvi willem@vooijs.eu Ansible"

    - name: "Set willem sudo permissions"
      ansible.builtin.copy:
        src: sudo-willem
        dest: /etc/sudoers.d/10-willem
        owner: root
        group: root
        mode: "440"

    - name: "Set ansible sudo permissions"
      ansible.builtin.copy:
        src: sudo-ansible
        dest: /etc/sudoers.d/10-ansible
        owner: root
        group: root
        mode: "440"

    - name: "Use latest-stable Alpine repositories"
      ansible.builtin.copy:
        src: alpine-repositories
        dest: /etc/apk/repositories
        owner: root
        group: root
        mode: "644"
      when: ansible_facts['distribution'] == "Alpine"

    - name: "Update packages"
      ansible.builtin.package:
        update_cache: true
        upgrade: true

    - name: "Install packages"
      ansible.builtin.package:
        update_cache: false
        name:
          - sudo
          - qemu-guest-agent
          - nano
        state: present

    - name: Enable and start qemu-guest-agent on Alpine
      ansible.builtin.service:
        name: qemu-guest-agent
        enabled: true
        state: started
      when:
        - ansible_facts['distribution'] == "Alpine"
        - ansible_facts['virtualization_type'] == "kvm"
